<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page not found — Spokesbox</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root { --teal: #00b4d8; --dark: #1a1a2e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .eyebrow { font-size: 72px; font-weight: 900; color: var(--teal); line-height: 1; margin-bottom: 16px; }
    h1 { font-size: clamp(24px, 4vw, 36px); font-weight: 800; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 18px; margin-bottom: 32px; }
    .btn { display: inline-block; background: var(--teal); color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 16px; }
    .btn:hover { background: #0096b7; }
  </style>
</head>
<body>
  <main id="main">
    <p class="eyebrow">404</p>
    <h1>That page took a different newsletter.</h1>
    <p>The link you followed is broken or the page has moved.</p>
    <a class="btn" href="/">Back to Spokesbox</a>
  </main>
</body>
</html>
