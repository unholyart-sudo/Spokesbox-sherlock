<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Invalid link — Spokesbox</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root { --teal: #00b4d8; --dark: #1a1a2e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: clamp(22px, 4vw, 32px); font-weight: 800; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 17px; margin-bottom: 28px; line-height: 1.6; }
    .btn { display: inline-block; background: var(--teal); color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 16px; }
    .btn:hover { background: #0096b7; }
  </style>
</head>
<body>
  <main id="main">
    <div class="icon">🔗</div>
    <h1>This unsubscribe link isn't valid.</h1>
    <p>It may have expired or already been used.<br>If you're still receiving emails, reply to any Spokesbox email and we'll sort it out right away.</p>
    <a class="btn" href="/">Back to Spokesbox</a>
  </main>
</body>
</html>
