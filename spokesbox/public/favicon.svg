<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#1a2744"/>
  <!-- Envelope body -->
  <rect x="12" y="38" width="76" height="48" rx="4" fill="none" stroke="#00b4d8" stroke-width="5"/>
  <!-- Envelope flap (V shape) -->
  <polyline points="12,38 50,64 88,38" fill="none" stroke="#00b4d8" stroke-width="5"/>
  <!-- 3 rays -->
  <line x1="50" y1="34" x2="50" y2="14" stroke="#00b4d8" stroke-width="3"/>
  <line x1="50" y1="34" x2="34" y2="18" stroke="#00b4d8" stroke-width="2.5"/>
  <line x1="50" y1="34" x2="66" y2="18" stroke="#00b4d8" stroke-width="2.5"/>
</svg>
