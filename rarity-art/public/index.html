<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rarity Advisors — Collection</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5f0;
  --surface: #fff;
  --border: #e8e0d8;
  --text: #1a1a1a;
  --muted: #888;
  --accent: #2c5282;
  --green: #276749;
  --red: #c53030;
  --gold: #b7791f;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { background: #1a1a1a; color: white; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }
.header-logo { font-size: 22px; }
.nav-tabs { display: flex; gap: 2px; margin-left: auto; }
.nav-tab { background: none; border: none; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.nav-tab.active, .nav-tab:hover { background: rgba(255,255,255,0.12); color: white; }

/* Summary Cards */
.summary { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.card { background: var(--surface); border-radius: 10px; padding: 16px; border: 1px solid var(--border); }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 6px; }
.card-value { font-size: 24px; font-weight: 700; color: var(--text); }
.card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.card.green .card-value { color: var(--green); }
.card.red .card-value { color: var(--red); }
.card.gold .card-value { color: var(--gold); }

/* Tabs content */
.tab-content { display: none; padding: 0 24px 24px; }
.tab-content.active { display: block; }

/* Search bar */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 9px 13px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--surface); color: var(--text); }
.search-bar input { flex: 1; min-width: 200px; }
.search-bar select { min-width: 140px; }
.btn { padding: 9px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: var(--accent); color: white; }
.btn:hover { opacity: 0.9; }

/* Results info */
.results-info { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

/* Table */
.table-wrap { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f0ede8; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); white-space: nowrap; }
td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: top; }
tr:hover td { background: #faf9f7; }
.artist-cell { font-weight: 600; }
.title-cell { color: #444; max-width: 260px; }
.thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #eee; }
.no-thumb { width: 40px; height: 40px; border-radius: 4px; background: #f0ede8; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-stock { background: #e6fffa; color: #276749; }
.badge-sold { background: #fff5f5; color: #c53030; }
.badge-other { background: #f7fafc; color: #666; }
.money { font-family: monospace; font-size: 12px; }

/* Pagination */
.pagination { display: flex; gap: 8px; align-items: center; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
.page-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; font-size: 13px; }
.page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.page-btn:hover:not(.active) { background: var(--bg); }

/* Charts */
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 640px) { .charts { grid-template-columns: 1fr; } }
.chart-box { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 16px; }
.chart-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-size: 12px; width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.bar-track { flex: 1; height: 10px; background: #f0ede8; border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.4s; }
.bar-count { font-size: 11px; color: var(--muted); width: 30px; text-align: right; }

.pie-legend { display: flex; flex-direction: column; gap: 6px; }
.pie-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--muted); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 12px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-img { width: 100%; max-height: 350px; object-fit: contain; background: var(--bg); }
.modal-body { padding: 20px; }
.modal-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-item label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 3px; }
.field-item span { font-size: 13px; }

/* Grid view */
.art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.grid-card { background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.grid-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.grid-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f0ede8; display: block; }
.grid-no-img { width: 100%; aspect-ratio: 1; background: #f0ede8; display: flex; align-items: center; justify-content: center; font-size: 36px; }
.grid-info { padding: 10px 12px 12px; }
.grid-artist { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grid-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.grid-price { font-size: 12px; color: var(--gold); font-weight: 600; }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; align-items: center; justify-content: center; flex-direction: column; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 75vh; object-fit: contain; border-radius: 4px; }
.lightbox-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 20px 24px; color: white; text-align: center; }
.lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; line-height: 1; }
.lightbox-nav { display: flex; gap: 12px; margin-top: 12px; align-items: center; }
.lightbox-nav button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 18px; }
.lightbox-nav button:hover { background: rgba(255,255,255,0.3); }
.lightbox-nav button:disabled { opacity: 0.3; cursor: default; }
.lightbox-dots { display: flex; gap: 6px; }
.lightbox-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.35); cursor: pointer; transition: background 0.2s; }
.lightbox-dot.active { background: white; }

/* Gallery thumbnails in modal */
.gallery-thumbs { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.gallery-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; cursor: pointer; opacity: 0.6; border: 2px solid transparent; transition: all 0.15s; }
.gallery-thumb.active, .gallery-thumb:hover { opacity: 1; border-color: var(--accent); }

/* View toggle */
.view-toggle { display: flex; gap: 4px; }
.view-btn { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; font-size: 14px; }
.view-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

@media (max-width: 600px) {
  .header { padding: 0 16px; }
  .header h1 { font-size: 15px; }
  .summary { padding: 16px; }
  .tab-content { padding: 0 16px 16px; }
  .modal-fields { grid-template-columns: 1fr; }
  .nav-tab { padding: 6px 10px; font-size: 12px; }
  .art-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
}
</style>
</head>
<body>

<div class="header">
  <img src="/ra-logo.png" alt="Rarity Advisors" style="height:32px;width:auto;object-fit:contain;">
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('overview')">Overview</button>
    <button class="nav-tab" onclick="switchTab('collection')">Collection</button>
    <button class="nav-tab" onclick="switchTab('sales')">Sales</button>
  </div>
</div>

<!-- OVERVIEW TAB -->
<div id="tab-overview" class="tab-content active">
  <div class="summary" id="summaryCards">
    <div class="loading">Loading…</div>
  </div>
  <div style="padding: 0 24px 20px;">
    <div class="charts" id="charts">
      <div class="chart-box"><div class="chart-title">Top Artists by # of Works</div><div id="artistChart" class="loading">…</div></div>
      <div class="chart-box"><div class="chart-title">Top Artists by Total Value</div><div id="statusChart" class="loading">…</div></div>
    </div>
  </div>
</div>

<!-- COLLECTION TAB -->
<div id="tab-collection" class="tab-content">
  <div class="search-bar">
    <input type="text" id="searchQ" placeholder="Search artist, title, medium…" oninput="debounceSearch()">
    <select id="artistFilter" onchange="searchArtworks()"><option value="">All Artists</option></select>
    <select id="statusFilter" onchange="searchArtworks()"><option value="">All Statuses</option></select>
    <select id="sortBy" onchange="onSortByChange()">
      <option value="artist">Sort: Artist</option>
      <option value="title">Sort: Title</option>
      <option value="year">Sort: Year</option>
      <option value="purchase_price">Sort: Purchase Price</option>
      <option value="retail_price">Sort: Retail Price</option>
    </select>
    <select id="sortOrder" onchange="searchArtworks()">
      <option value="asc">↑ Asc</option>
      <option value="desc">↓ Desc</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btnList" onclick="setView('list')" title="List view">☰</button>
      <button class="view-btn" id="btnGrid" onclick="setView('grid')" title="Grid view">⊞</button>
    </div>
  </div>
  <div class="results-info" id="resultsInfo"></div>
  <!-- List view -->
  <div id="listView" class="table-wrap">
    <table>
      <thead><tr>
        <th></th>
        <th>Artist</th>
        <th>Title</th>
        <th>Year</th>
        <th>Medium</th>
        <th>Size</th>
        <th>Purchase Price + Fees</th>
        <th>Status</th>
        <th>Location</th>
      </tr></thead>
      <tbody id="artworkTable"><tr><td colspan="8" class="loading">Loading…</td></tr></tbody>
    </table>
  </div>
  <!-- Grid view -->
  <div id="gridView" style="display:none">
    <div class="art-grid" id="artworkGrid"></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
  <div class="lightbox-nav" onclick="event.stopPropagation()">
    <button id="lightboxPrev" onclick="lightboxStep(-1)">‹</button>
    <div class="lightbox-dots" id="lightboxDots"></div>
    <button id="lightboxNext" onclick="lightboxStep(1)">›</button>
  </div>
  <div class="lightbox-info" onclick="event.stopPropagation()">
    <div style="font-size:12px;opacity:0.7;margin-bottom:4px" id="lightboxArtist"></div>
    <div style="font-size:18px;font-weight:600;margin-bottom:4px" id="lightboxTitle"></div>
    <div style="font-size:14px;opacity:0.8" id="lightboxPrice"></div>
  </div>
</div>

<div style="display:none">`
</div>

<!-- SALES TAB -->
<div id="tab-sales" class="tab-content">
  <h3 style="font-size:15px; margin-bottom:14px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px;">Sold Inventory</h3>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Artist</th>
        <th>Title</th>
        <th>Purchase Date</th>
        <th>Cost</th>
        <th>Sold For</th>
        <th>Sold To</th>
        <th>P&L</th>
      </tr></thead>
      <tbody id="salesTable"><tr><td colspan="7" class="loading">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px" id="modalArtist"></div>
        <div style="font-size:18px;font-weight:600" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <img class="modal-img" id="modalImg" onerror="this.style.display='none'">
    <div class="modal-body">
      <div class="modal-fields" id="modalFields"></div>
    </div>
  </div>
</div>

<script>
let currentPage = 0;
const PAGE_SIZE = 50;
let totalResults = 0;
let debounceTimer;
let currentView = 'list';

function setView(v) {
  currentView = v;
  document.getElementById('listView').style.display = v === 'list' ? '' : 'none';
  document.getElementById('gridView').style.display = v === 'grid' ? '' : 'none';
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  renderCurrentResults();
}

let lightboxImages = [];
let lightboxIdx = 0;

function openLightbox(idx, imgIdx = 0) {
  const results = window._lastResults || [];
  const offset = window._lastOffset || 0;
  const a = results[idx - offset];
  if (!a) return;
  const imgs = a.images && a.images.length ? a.images : (a.img_large || a.img_medium || a.img_small ? [a.img_large || a.img_medium || a.img_small] : []);
  if (!imgs.length) return;
  lightboxImages = imgs;
  lightboxIdx = imgIdx;
  window._lightboxArtwork = a;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  if (event) event.stopPropagation();
}

function renderLightbox() {
  const a = window._lightboxArtwork;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIdx];
  document.getElementById('lightboxArtist').textContent = a.artist || '';
  document.getElementById('lightboxTitle').textContent = (a.title || 'Untitled').split('\n')[0];
  const price = a._purchase_total ? `$${Math.round(a._purchase_total).toLocaleString()} purchased` : '';
  document.getElementById('lightboxPrice').textContent = price + (lightboxImages.length > 1 ? ` · ${lightboxIdx+1}/${lightboxImages.length}` : '');
  document.getElementById('lightboxPrev').disabled = lightboxIdx === 0;
  document.getElementById('lightboxNext').disabled = lightboxIdx === lightboxImages.length - 1;
  // Dots
  document.getElementById('lightboxDots').innerHTML = lightboxImages.length > 1 
    ? lightboxImages.map((_, i) => `<div class="lightbox-dot ${i===lightboxIdx?'active':''}" onclick="lightboxGoTo(${i})"></div>`).join('')
    : '';
}

function lightboxStep(dir) {
  lightboxIdx = Math.max(0, Math.min(lightboxImages.length - 1, lightboxIdx + dir));
  renderLightbox();
}

function lightboxGoTo(i) {
  lightboxIdx = i;
  renderLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'collection' && !document.getElementById('artistFilter').options.length > 1) loadFilters();
  if (name === 'sales') loadSales();
}

// Load summary
async function loadSummary() {
  const data = await fetch('/api/summary').then(r => r.json());
  
  const profit = data.netProfit;
  const profitClass = profit >= 0 ? 'green' : 'red';
  const topName = data.topHolding ? `${data.topHolding.artist} — ${(data.topHolding.title||'').split(',')[0]}` : '—';

  document.getElementById('summaryCards').innerHTML = `
    <div class="card gold"><div class="card-label">Total Invested</div><div class="card-value">$${data.totalInvested.toLocaleString()}</div><div class="card-sub">${data.totalHoldings} works · ${data.artistCount} artists</div></div>
    <div class="card"><div class="card-label">Avg Purchase Price</div><div class="card-value">$${data.avgPurchase.toLocaleString()}</div><div class="card-sub">per work (incl. fees)</div></div>
    <div class="card"><div class="card-label">Top Holding</div><div class="card-value" style="font-size:15px;line-height:1.2">${topName}</div><div class="card-sub">$${(data.topHolding?.value||0).toLocaleString()}</div></div>
    <div class="card"><div class="card-label">Works Sold</div><div class="card-value">${data.soldCount}</div><div class="card-sub">$${data.totalSoldRevenue.toLocaleString()} gross revenue</div></div>
    <div class="card ${profitClass}"><div class="card-label">Realized P&L</div><div class="card-value">${profit >= 0 ? '+' : ''}$${Math.abs(profit).toLocaleString()}</div><div class="card-sub">sold works only</div></div>
  `;

  // Top artists by holdings count
  const maxCount = data.topArtists[0]?.count || 1;
  document.getElementById('artistChart').innerHTML = data.topArtists.map(a => `
    <div class="bar-row">
      <div class="bar-label" title="${a.name}">${a.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(a.count/maxCount*100)}%"></div></div>
      <div class="bar-count">${a.count}</div>
    </div>
  `).join('');

  // Top artists by value
  const maxVal = data.topByValue[0]?.value || 1;
  const colors = ['#2c5282','#276749','#b7791f','#c53030','#553c9a','#2b6cb0','#744210','#285e61','#702459','#2d3748'];
  document.getElementById('statusChart').innerHTML = data.topByValue.map((a, i) => `
    <div class="bar-row">
      <div class="bar-label" title="${a.name}">${a.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(a.value/maxVal*100)}%;background:${colors[i%colors.length]}"></div></div>
      <div class="bar-count" style="width:60px;color:${colors[i%colors.length]}">$${(a.value/1000).toFixed(1)}k</div>
    </div>
  `).join('');
}

// Load filter options
async function loadFilters() {
  const [artists, statuses] = await Promise.all([
    fetch('/api/artists').then(r => r.json()),
    fetch('/api/statuses').then(r => r.json()),
  ]);
  const af = document.getElementById('artistFilter');
  artists.forEach(a => { const o = document.createElement('option'); o.value = a; o.text = a; af.appendChild(o); });
  const sf = document.getElementById('statusFilter');
  statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.text = s; sf.appendChild(o); });
}

// Search artworks
function onSortByChange() {
  const sort = document.getElementById('sortBy').value;
  const orderEl = document.getElementById('sortOrder');
  if (sort === 'purchase_price' || sort === 'retail_price') {
    orderEl.value = 'desc';
  }
  searchArtworks();
}

async function searchArtworks(resetPage = true) {
  if (resetPage) currentPage = 0;
  const q = document.getElementById('searchQ').value;
  const artist = document.getElementById('artistFilter').value;
  const status = document.getElementById('statusFilter').value;
  const sort = document.getElementById('sortBy').value;
  const order = document.getElementById('sortOrder').value;
  const offset = currentPage * PAGE_SIZE;
  
  const params = new URLSearchParams({ q, artist, status, sort, order, limit: PAGE_SIZE, offset });
  const data = await fetch('/api/artworks?' + params).then(r => r.json());
  totalResults = data.total;
  
  document.getElementById('resultsInfo').textContent = `${data.total.toLocaleString()} results`;
  
  window._lastResults = data.results;
  window._lastOffset = offset;
  renderCurrentResults();
  renderPagination();
}

function renderCurrentResults() {
  const results = window._lastResults || [];
  const offset = window._lastOffset || 0;
  if (currentView === 'grid') { renderGrid(results, offset); return; }
  renderList(results, offset);
}

function renderGrid(results, offset) {
  document.getElementById('artworkGrid').innerHTML = results.map((a, i) => {
    const idx = offset + i;
    const imgSrc = a.img_small || '';
    const imgEl = imgSrc
      ? `<img class="grid-img" src="${imgSrc}" loading="lazy" onclick="openLightbox(${idx})">`
      : `<div class="grid-no-img" onclick="openLightbox(${idx})">🖼️</div>`;
    const price = a._purchase_total ? `$${Math.round(a._purchase_total).toLocaleString()}` : '';
    return `<div class="grid-card" onclick="openModal(${idx})">
      ${imgEl}
      <div class="grid-info">
        <div class="grid-artist">${a.artist || '—'}</div>
        <div class="grid-title">${(a.title || 'Untitled').split('\n')[0]}</div>
        ${price ? `<div class="grid-price">${price}</div>` : ''}
      </div>
    </div>`;
  }).join('') || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">No results</div>';
}

function renderList(results, offset) {
  document.getElementById('artworkTable').innerHTML = results.map((a, i) => {
    const imgCell = a.img_small ? `<img class="thumb" src="${a.img_small}" loading="lazy">` : `<div class="no-thumb">🖼️</div>`;
    const statusBadge = a.status?.toLowerCase().includes('sold') ? 'badge-sold' :
                        a.status?.toLowerCase().includes('stock') ? 'badge-stock' : 'badge-other';
    const idx = offset + i;
    const purchaseDisplay = a._purchase_total
      ? `<span class="money" style="color:var(--gold)">$${Math.round(a._purchase_total).toLocaleString()}</span>${a._purchase_fees ? `<span style="font-size:10px;color:var(--muted)"> (incl. $${Math.round(a._purchase_fees).toLocaleString()} fees)</span>` : ''}`
      : '<span style="color:#ddd">—</span>';
    return `<tr onclick="openModal(${idx})" style="cursor:pointer">
      <td>${imgCell}</td>
      <td class="artist-cell">${a.artist || '—'}</td>
      <td class="title-cell">${(a.title || 'Untitled').split('\n')[0]}</td>
      <td style="white-space:nowrap;color:var(--muted)">${a.year || ''}</td>
      <td style="color:var(--muted);max-width:140px">${(a.medium || '').substring(0,60)}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${a.dimensions || ''}</td>
      <td>${purchaseDisplay}</td>
      <td><span class="badge ${statusBadge}">${a.status || ''}</span></td>
      <td style="color:var(--muted);font-size:12px">${a.location || ''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted)">No results</td></tr>';
}

function debounceSearch() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => searchArtworks(true), 300);
}

function renderPagination() {
  const total = totalResults;
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  
  let html = '';
  if (currentPage > 0) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">← Prev</button>`;
  
  const start = Math.max(0, currentPage - 2);
  const end = Math.min(pages - 1, currentPage + 2);
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p+1}</button>`;
  }
  if (currentPage < pages - 1) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">Next →</button>`;
  html += `<span style="font-size:12px;color:var(--muted)">of ${pages} pages</span>`;
  
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  searchArtworks(false);
  document.getElementById('tab-collection').scrollTop = 0;
}

// Load sales
async function loadSales() {
  const data = await fetch('/api/artworks?source=sold&limit=500').then(r => r.json());
  
  document.getElementById('salesTable').innerHTML = data.results.map(r => {
    const pl = parseFloat(r._profit) || 0;
    const plClass = pl > 0 ? 'color:var(--green)' : pl < 0 ? 'color:var(--red)' : '';
    return `<tr>
      <td class="artist-cell">${r.artist || '—'}</td>
      <td class="title-cell">${(r.title || '').substring(0, 60)}</td>
      <td style="color:var(--muted);white-space:nowrap;font-size:12px">${formatDate(r._purchase_date)}</td>
      <td class="money">$${fmt(r._purchase_price)}</td>
      <td class="money">$${fmt(r._sold_price)}</td>
      <td style="color:var(--muted);font-size:12px">${r._sold_to || ''}</td>
      <td class="money" style="${plClass}">${pl >= 0 ? '+' : ''}$${fmt(pl)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)">No sales data</td></tr>';
}

function fmt(v) {
  const n = parseFloat(v) || 0;
  return Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
}

function formatDate(v) {
  if (!v) return '';
  if (typeof v === 'string') return v.substring(0,10);
  return '';
}

// Modal
function openModal(idx) {
  const results = window._lastResults || [];
  const offset = window._lastOffset || 0;
  const a = results[idx - offset];
  if (!a) return;
  
  document.getElementById('modalArtist').textContent = (a.artist || '') + (a.artist_dates ? ` (${a.artist_dates})` : '');
  document.getElementById('modalTitle').textContent = a.title || 'Untitled';
  const img = document.getElementById('modalImg');
  img.style.display = '';
  img.src = a.img_medium || a.img_small || '';
  if (!img.src) img.style.display = 'none';
  
  const fields = [
    ['Year', a.year], ['Medium', a.medium], ['Dimensions', a.dimensions],
    ['Status', a.status], ['Availability', a.availability],
    ['Location', a.location], ['Stock #', a.stock_number],
    ['Price', a.retail_price ? `${a.retail_currency || ''} ${a.retail_price}` : ''],
    ['Provenance', a.provenance],
  ].filter(([,v]) => v);
  
  document.getElementById('modalFields').innerHTML = fields.map(([l,v]) => `
    <div class="field-item"><label>${l}</label><span>${v}</span></div>
  `).join('');

  // Gallery thumbnails
  const imgs = a.images && a.images.length ? a.images : (a.img_small ? [a.img_small] : []);
  const thumbsEl = document.getElementById('modalThumbs') || (() => {
    const d = document.createElement('div');
    d.id = 'modalThumbs';
    d.className = 'gallery-thumbs';
    document.getElementById('modalFields').after(d);
    return d;
  })();
  if (imgs.length > 1) {
    thumbsEl.innerHTML = imgs.map((src, i) => `<img class="gallery-thumb ${i===0?'active':''}" src="${src}" onclick="switchModalImg(${idx}, ${i}, this)">`).join('');
    thumbsEl.style.display = 'flex';
  } else {
    thumbsEl.innerHTML = '';
    thumbsEl.style.display = 'none';
  }
  
  document.getElementById('modal').classList.add('open');
}

function switchModalImg(idx, imgIdx, el) {
  const results = window._lastResults || [];
  const offset = window._lastOffset || 0;
  const a = results[idx - offset];
  if (!a) return;
  const imgs = a.images || [];
  document.getElementById('modalImg').src = imgs[imgIdx] || '';
  document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').onclick = e => { if (e.target === e.currentTarget) closeModal(); };

// Keyboard nav for lightbox
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lightboxStep(-1);
  if (e.key === 'ArrowRight') lightboxStep(1);
  if (e.key === 'Escape') closeLightbox();
});

// Init
loadSummary();
loadFilters();
searchArtworks();
</script>
</body>
</html>
